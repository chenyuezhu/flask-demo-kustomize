name: WeCom Notification
on: [push]

jobs:
  send_wecom_msg:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：确保curl和jq可用（基础环境）
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq

      # 步骤2：发送企微消息（核心：用echo构造纯静态JSON，避免转义）
      - name: Send to WeCom
        run: |
          # 1. 构造100%合规的JSON（无换行、无特殊字符）
          JSON_STRING='{"msgtype":"text","text":{"content":"GitHub推送：flask-demo-kustomize仓库有新提交"}}'
          
          # 2. 强制格式化JSON（避免隐形字符）
          JSON_FORMATTED=$(echo "$JSON_STRING" | jq -c .)
          
          # 3. 发送请求（打印所有日志，方便排查）
          echo "发送的JSON：$JSON_FORMATTED"
          RESPONSE=$(curl -s -X POST "${WECOM_WEBHOOK}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$JSON_FORMATTED")
          echo "企微返回：$RESPONSE"
          
          # 4. 校验结果
          if echo "$RESPONSE" | jq -e '.errcode == 0' > /dev/null; then
            echo "消息发送成功"
            exit 0
          else
            echo "消息发送失败"
            exit 1
          fi
        env:
          # 直接填企微key（也可继续用Secrets，先测试）
          WECOM_WEBHOOK: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=997448da-7a88-46f3-915f-5620eb2c9921"
