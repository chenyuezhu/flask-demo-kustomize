name: WeCom Notification
on:
  push:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to WeCom
        uses: actions/github-script@v7
        with:
          script: |
            // 1. 提取 GitHub 事件信息
            const repoName = `${context.repo.owner}/${context.repo.repo}`;
            const eventType = context.eventName;
            const committer = context.actor;
            const branch = context.ref.replace('refs/heads/', '');
            const commitMsg = context.payload.head_commit?.message || '无提交信息';
            
            // 2. 构造企业微信消息体（核心：适配企微格式）
            const requestBody = {
              "msgtype": "text", // 企微是 msgtype（无下划线）
              "text": {
                "content": `🚨 GitHub 仓库事件通知
仓库：${repoName}
事件类型：${eventType}
提交人：${committer}
分支：${branch}
提交信息：${commitMsg}`
              }
            };

            // 3. 发送请求到企业微信
            try {
              const response = await github.request('POST ' + process.env.WECOM_WEBHOOK, {
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: JSON.stringify(requestBody)
              });
              console.log('企微消息发送成功，响应：', JSON.stringify(response.data));
            } catch (error) {
              console.error('发送失败：', error.message);
              if (error.response) {
                console.error('企微错误响应：', JSON.stringify(error.response.data));
              }
            }
        env:
          # 替换为你的企微机器人 WebHook 地址
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
