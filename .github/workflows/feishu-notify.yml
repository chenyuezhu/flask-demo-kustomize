name: Feishu Notification
on:
  push:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Feishu
        uses: actions/github-script@v7
        with:
          script: |
            // 1. 准备参数
            const webhook = process.env.FEISHU_WEBHOOK;  // V1 地址，无需签名
            const content = `
            🚨 GitHub 仓库事件通知
            仓库：${context.repo.owner}/${context.repo.repo}
            事件类型：${context.eventName}
            提交人：${context.actor}
            分支：${context.ref.replace('refs/heads/', '')}
            提交信息：${context.payload.commits?.[0]?.message || '(无提交信息)'}
            `;

            // 2. 构造飞书请求体
            const requestBody = {
              msg_type: 'text',
              content: { text: content }
            };

            // 3. 发送请求到飞书
            try {
              const response = await github.request('POST ' + webhook, {
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
              });
              console.log('✅ 通知已发送到飞书，响应状态：', response.status);
              console.log('📩 飞书返回内容：', JSON.stringify(response.data));
            } catch (error) {
              console.error('❌ 发送失败：', error.message);
              if (error.response) {
                console.error('🔍 飞书返回的错误详情：', JSON.stringify(error.response.data));
              } else {
                console.error('🔍 未收到飞书响应，原始错误：', error);
              }
            }
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
