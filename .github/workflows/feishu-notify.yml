name: Feishu Notification
on:
  push:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Feishu
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            
            // 1. 准备参数
            const webhook = process.env.FEISHU_WEBHOOK;
            const secret = process.env.FEISHU_SECRET;
            const timestamp = Date.now();
            const content = `
            🚨 GitHub 仓库事件通知
            仓库：${context.repo.owner}/${context.repo.repo}
            事件类型：${context.eventName}
            提交人：${context.actor}
            分支：${context.ref.replace('refs/heads/', '')}
            `;

            // 2. 生成飞书签名（如果开启了签名验证才需要）
            let sign = '';
            if (secret) {
              const stringToSign = `${timestamp}\n${secret}`;
              sign = crypto.createHmac('sha256', secret)
                .update(stringToSign)
                .digest('base64');
            }

            // 3. 构造飞书请求体
            const requestBody = {
              msg_type: 'text',
              content: { text: content },
              timestamp: timestamp.toString(),
              sign: sign
            };

            // 4. 发送请求到飞书（改用 github.request，无需 node-fetch）
            try {
              const response = await github.request('POST ' + webhook, {
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
              });
              console.log('通知已发送到飞书，响应状态：', response.status);
            } catch (error) {
              console.error('发送失败：', error.message);
              if (error.response) {
                console.error('飞书返回：', JSON.stringify(error.response.data));
              }
            }
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
